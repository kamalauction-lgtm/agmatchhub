name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    env:
      # Build-time placeholders; real values are injected per environment.
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      APP_BASE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run test  # RLS suite runs when test env secrets are configured; skips otherwise
      - run: npm run build
      - name: Check no secrets committed
        run: |
          if git grep -nE "sb_secret_|SUPABASE_SERVICE_ROLE_KEY=." -- ':!.env.example' ':!.github/workflows/ci.yml'; then
            echo "::error::Possible secret committed"; exit 1
          fi
